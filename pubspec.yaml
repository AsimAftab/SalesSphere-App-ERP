name: sales_sphere_erp
description: "SalesSphere ERP — field operations companion mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # State management (Riverpod 3 with code generation)
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Routing + deep linking
  go_router: ^16.3.0
  app_links: ^6.3.0

  # Models / immutability
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  drift: ^2.20.3
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1

  # Realtime + connectivity
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^7.0.0
  battery_plus: ^7.0.0

  # Maps + location
  google_maps_flutter: ^2.13.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Background + notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^19.5.0

  # Auth UX
  local_auth: ^2.3.0

  # UI / theming
  flex_color_scheme: ^8.3.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10

  # Files / media
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  pdf: ^3.11.3
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1

  # Observability
  sentry_flutter: ^9.8.0
  logger: ^2.6.2

  # i18n + utils
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  riverpod_generator: ^3.0.3
  drift_dev: ^2.20.3
  swagger_parser: ^1.43.1

  # Lint
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3
  very_good_analysis: ^7.0.0

  # Testing
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/png/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
